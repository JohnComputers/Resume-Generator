<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder · Print-Ready</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF9F6;
  --paper:#FFFFFF;
  --ink:#1A1A1A;
  --ink-soft:#4A4A48;
  --ink-faint:#8B8B85;
  --rule:#E5E2DA;
  --rule-soft:#EFECE4;
  --accent:#7A2E1F;
  --field-bg:#F4F2EC;
  --shadow:0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Manrope',sans-serif;
  font-size:14px;
  line-height:1.5;
  overflow:hidden;
}

/* HEADER */
.topbar{
  height:56px;
  border-bottom:1px solid var(--rule);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:14px;
  background:var(--paper);
}
.brand{
  font-family:'Crimson Pro',serif;
  font-size:20px;
  font-weight:600;
  letter-spacing:-.01em;
}
.brand small{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.18em;
  color:var(--ink-faint);
  font-weight:500;
  margin-left:6px;
}
.topbar-spacer{flex:1}
.template-picker{
  display:flex;
  gap:0;
  border:1px solid var(--rule);
  border-radius:6px;
  overflow:hidden;
}
.template-picker button{
  background:transparent;
  border:0;
  padding:7px 14px;
  font:inherit;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  color:var(--ink-soft);
  border-right:1px solid var(--rule);
  font-family:'Manrope',sans-serif;
  letter-spacing:.01em;
}
.template-picker button:last-child{border-right:0}
.template-picker button.active{
  background:var(--ink);
  color:var(--paper);
}
.btn{
  padding:7px 14px;
  border:1px solid var(--rule);
  background:var(--paper);
  border-radius:6px;
  font:inherit;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  color:var(--ink);
  transition:all .12s;
  font-family:'Manrope',sans-serif;
}
.btn:hover{border-color:var(--ink);background:var(--field-bg)}
.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.primary:hover{background:#000}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:minmax(380px,1fr) minmax(500px,1.2fr);
  height:calc(100vh - 56px);
}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

/* EDITOR PANE */
.editor{
  overflow-y:auto;
  background:var(--bg);
  padding:24px 28px 80px;
  border-right:1px solid var(--rule);
}
.editor::-webkit-scrollbar{width:8px}
.editor::-webkit-scrollbar-thumb{background:var(--rule);border-radius:4px}

.section{
  margin-bottom:28px;
}
.section-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}
.section-head h3{
  font-family:'Crimson Pro',serif;
  font-size:18px;
  font-weight:600;
  letter-spacing:-.005em;
}
.section-head .num{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--ink-faint);
  font-weight:500;
  letter-spacing:.1em;
}
.section-head .line{flex:1;height:1px;background:var(--rule)}

label{
  display:block;
  font-size:11px;
  font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:5px;
}
input,textarea{
  width:100%;
  padding:9px 12px;
  border:1px solid var(--rule);
  border-radius:5px;
  background:var(--paper);
  font:inherit;
  font-size:13px;
  color:var(--ink);
  font-family:'Manrope',sans-serif;
  transition:border-color .12s;
}
input:focus,textarea:focus{outline:0;border-color:var(--ink)}
textarea{resize:vertical;min-height:64px;line-height:1.5}
.field{margin-bottom:10px}
.field-row{display:grid;gap:10px}
.field-row.cols-2{grid-template-columns:1fr 1fr}
.field-row.cols-3{grid-template-columns:1fr 1fr 1fr}

.entry{
  background:var(--paper);
  border:1px solid var(--rule);
  border-radius:8px;
  padding:14px;
  margin-bottom:10px;
  position:relative;
}
.entry-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
.entry-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--ink-faint);
  font-weight:500;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.icon-btn{
  background:transparent;
  border:0;
  cursor:pointer;
  color:var(--ink-faint);
  padding:4px;
  border-radius:4px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.icon-btn:hover{color:var(--accent);background:var(--field-bg)}
.add-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:transparent;
  border:1px dashed var(--rule);
  padding:9px 14px;
  border-radius:6px;
  cursor:pointer;
  font:inherit;
  font-size:12px;
  font-weight:500;
  color:var(--ink-soft);
  width:100%;
  justify-content:center;
  transition:all .12s;
  font-family:'Manrope',sans-serif;
}
.add-btn:hover{border-color:var(--ink);color:var(--ink);border-style:solid}

/* PREVIEW PANE */
.preview-wrap{
  overflow-y:auto;
  padding:32px;
  background:#E8E5DD;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.preview-wrap::-webkit-scrollbar{width:8px}
.preview-wrap::-webkit-scrollbar-thumb{background:#C9C5BC;border-radius:4px}

.page{
  width:100%;
  max-width:760px;
  min-height:1000px;
  background:var(--paper);
  box-shadow:var(--shadow);
  padding:60px 70px;
  margin-bottom:24px;
}

/* ============ TEMPLATE: CLASSIC ============ */
.tpl-classic{
  font-family:'Crimson Pro',serif;
  color:#1a1a1a;
  font-size:14px;
  line-height:1.55;
}
.tpl-classic .name{
  font-size:36px;
  font-weight:600;
  letter-spacing:-.01em;
  text-align:center;
  margin-bottom:4px;
}
.tpl-classic .title-line{
  text-align:center;
  font-size:13px;
  color:#555;
  font-style:italic;
  margin-bottom:8px;
}
.tpl-classic .contact-line{
  text-align:center;
  font-size:12px;
  color:#444;
  margin-bottom:24px;
  letter-spacing:.01em;
}
.tpl-classic .contact-line span{margin:0 9px}
.tpl-classic h2{
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.18em;
  border-bottom:1.5px solid #1a1a1a;
  padding-bottom:3px;
  margin:18px 0 10px;
  font-family:'Crimson Pro',serif;
}
.tpl-classic .item{margin-bottom:14px}
.tpl-classic .item-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:1px;
}
.tpl-classic .item-title{font-weight:600;font-size:15px}
.tpl-classic .item-meta{font-size:12px;color:#555;font-style:italic}
.tpl-classic .item-sub{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#444;
  font-style:italic;
  margin-bottom:5px;
}
.tpl-classic .item-body{font-size:13.5px}
.tpl-classic .item-body ul{padding-left:18px;margin:4px 0}
.tpl-classic .item-body li{margin-bottom:2px}
.tpl-classic .skills-grid{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:4px 14px;
  font-size:13.5px;
}
.tpl-classic .skills-grid dt{font-weight:600}

/* ============ TEMPLATE: MODERN ============ */
.tpl-modern{
  font-family:'Manrope',sans-serif;
  color:#0f0f0f;
  font-size:13px;
  line-height:1.55;
}
.tpl-modern .header-block{
  border-bottom:3px solid #0f0f0f;
  padding-bottom:18px;
  margin-bottom:22px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:16px;
  align-items:end;
}
.tpl-modern .name{
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:42px;
  font-weight:700;
  letter-spacing:-.025em;
  line-height:1;
}
.tpl-modern .title-line{
  font-size:14px;
  color:#444;
  font-weight:500;
  margin-top:6px;
}
.tpl-modern .contact-block{
  text-align:right;
  font-size:11.5px;
  color:#444;
  line-height:1.7;
}
.tpl-modern .contact-block div{display:block}
.tpl-modern h2{
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.22em;
  color:#0f0f0f;
  margin:20px 0 12px;
}
.tpl-modern .item{
  margin-bottom:16px;
  padding-left:14px;
  border-left:2px solid #E5E2DA;
}
.tpl-modern .item-head{margin-bottom:2px}
.tpl-modern .item-title{font-weight:700;font-size:14px}
.tpl-modern .item-meta{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#666;
  margin-bottom:6px;
}
.tpl-modern .item-meta .org{font-weight:500;color:#0f0f0f}
.tpl-modern .item-body{font-size:12.5px;color:#222}
.tpl-modern .item-body ul{padding-left:16px;margin:4px 0}
.tpl-modern .item-body li{margin-bottom:3px}
.tpl-modern .skills-pills{display:flex;flex-wrap:wrap;gap:6px}
.tpl-modern .skill-pill{
  background:#F4F2EC;
  padding:4px 10px;
  border-radius:3px;
  font-size:11.5px;
  font-weight:500;
}

/* ============ TEMPLATE: MINIMAL ============ */
.tpl-minimal{
  font-family:'JetBrains Mono',monospace;
  color:#1a1a1a;
  font-size:11.5px;
  line-height:1.65;
}
.tpl-minimal .name{
  font-size:18px;
  font-weight:600;
  letter-spacing:-.005em;
  margin-bottom:1px;
}
.tpl-minimal .title-line{font-size:12px;color:#555;margin-bottom:4px}
.tpl-minimal .contact-line{font-size:10.5px;color:#666;margin-bottom:18px}
.tpl-minimal .contact-line span:not(:last-child)::after{content:" · ";color:#aaa}
.tpl-minimal h2{
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.15em;
  margin:18px 0 8px;
  color:#1a1a1a;
}
.tpl-minimal h2::before{content:"// "}
.tpl-minimal .item{margin-bottom:12px}
.tpl-minimal .item-head{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}
.tpl-minimal .item-title{font-weight:600}
.tpl-minimal .item-meta{color:#666}
.tpl-minimal .item-sub{
  font-size:11px;
  color:#666;
  margin-bottom:3px;
}
.tpl-minimal .item-body{font-size:11px;color:#333}
.tpl-minimal .item-body ul{padding-left:16px;margin:3px 0;list-style:none}
.tpl-minimal .item-body li{position:relative;margin-bottom:2px}
.tpl-minimal .item-body li::before{content:"›";position:absolute;left:-14px;color:#888}
.tpl-minimal .skills-list{font-size:11px}
.tpl-minimal .skills-list strong{display:inline-block;min-width:90px}

/* PRINT */
@media print{
  body{background:#fff;overflow:visible;height:auto}
  .topbar,.editor,.preview-wrap{display:none}
  .preview-wrap{display:block!important;background:#fff;padding:0;overflow:visible}
  .layout{display:block;height:auto}
  .page{
    margin:0;
    padding:0.6in 0.7in;
    box-shadow:none;
    width:100%;
    max-width:none;
    min-height:auto;
    page-break-after:always;
  }
  .preview-wrap > *:not(.page){display:none}
  /* Print only the active template */
  .page:not(.is-printing){display:none}
}
.print-hidden-during{display:none}

/* utility */
.empty-text{color:var(--ink-faint);font-style:italic;font-size:12px}
.subtle-hint{font-size:11px;color:var(--ink-faint);margin-top:-4px;margin-bottom:8px}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Résumé<small>builder</small></div>
  <div class="topbar-spacer"></div>
  <div class="template-picker" id="tplPicker">
    <button data-tpl="classic" class="active">Classic</button>
    <button data-tpl="modern">Modern</button>
    <button data-tpl="minimal">Minimal</button>
  </div>
  <button class="btn" id="loadBtn">Import JSON</button>
  <button class="btn" id="saveBtn">Export JSON</button>
  <button class="btn primary" id="printBtn">Download PDF</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</div>

<div class="layout">

<!-- =================== EDITOR =================== -->
<div class="editor" id="editor">

  <div class="section">
    <div class="section-head">
      <span class="num">01</span>
      <h3>Personal</h3>
      <div class="line"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label>Full name</label><input data-bind="personal.name" placeholder="Jane Doe"></div>
      <div class="field"><label>Title / role</label><input data-bind="personal.title" placeholder="Senior Product Designer"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label>Email</label><input data-bind="personal.email" placeholder="jane@example.com"></div>
      <div class="field"><label>Phone</label><input data-bind="personal.phone" placeholder="(415) 555-0123"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label>Location</label><input data-bind="personal.location" placeholder="San Francisco, CA"></div>
      <div class="field"><label>Website</label><input data-bind="personal.website" placeholder="janedoe.com"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label>LinkedIn</label><input data-bind="personal.linkedin" placeholder="linkedin.com/in/jane"></div>
      <div class="field"><label>GitHub</label><input data-bind="personal.github" placeholder="github.com/jane"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="num">02</span>
      <h3>Summary</h3>
      <div class="line"></div>
    </div>
    <textarea data-bind="summary" rows="4" placeholder="A two-to-three-sentence professional summary that highlights your strengths and what you're looking for."></textarea>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="num">03</span>
      <h3>Experience</h3>
      <div class="line"></div>
    </div>
    <div id="experienceList"></div>
    <button class="add-btn" data-add="experience">+ Add experience</button>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="num">04</span>
      <h3>Education</h3>
      <div class="line"></div>
    </div>
    <div id="educationList"></div>
    <button class="add-btn" data-add="education">+ Add education</button>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="num">05</span>
      <h3>Skills</h3>
      <div class="line"></div>
    </div>
    <p class="subtle-hint">Format: <code>Category: skill1, skill2, skill3</code> — one per line</p>
    <textarea data-bind="skillsRaw" rows="5" placeholder="Languages: Python, JavaScript, Go&#10;Tools: Figma, Notion, Linear&#10;Other: Public speaking, Mentorship"></textarea>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="num">06</span>
      <h3>Projects</h3>
      <div class="line"></div>
    </div>
    <div id="projectsList"></div>
    <button class="add-btn" data-add="projects">+ Add project</button>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="num">07</span>
      <h3>Certifications</h3>
      <div class="line"></div>
    </div>
    <div id="certificationsList"></div>
    <button class="add-btn" data-add="certifications">+ Add certification</button>
  </div>

</div>

<!-- =================== PREVIEW =================== -->
<div class="preview-wrap">
  <div class="page tpl-classic" id="resumePage">
    <!-- rendered by JS -->
  </div>
</div>

</div>

<script>
//============================================================
// STATE & PERSISTENCE
//============================================================
const STORAGE_KEY = 'resume_builder_v1';

const sample = {
  template: 'classic',
  personal: {
    name: 'Alex Morgan',
    title: 'Senior Product Designer',
    email: 'alex.morgan@example.com',
    phone: '(415) 555-0173',
    location: 'San Francisco, CA',
    website: 'alexmorgan.design',
    linkedin: 'linkedin.com/in/alexmorgan',
    github: ''
  },
  summary: 'Senior product designer with 8+ years building consumer and enterprise software. I lead design end-to-end — from research and strategy through high-fidelity execution — and have shipped products used by millions. Currently looking for a senior IC role at a mission-driven company.',
  experience: [
    {
      role: 'Senior Product Designer',
      company: 'Linear',
      location: 'San Francisco, CA',
      start: 'Mar 2022',
      end: 'Present',
      bullets: 'Led design for the new Cycles feature, used by 60% of active teams within 4 months of launch.\nPartnered with engineering to ship a redesigned mobile app, lifting weekly active users by 34%.\nMentored two junior designers and codified the team\'s design review process.'
    },
    {
      role: 'Product Designer',
      company: 'Notion',
      location: 'Remote',
      start: 'Jun 2019',
      end: 'Feb 2022',
      bullets: 'Owned the Databases redesign, the largest feature shipped that year.\nBuilt and maintained the Notion design system used by 30+ designers and engineers.\nRan weekly user research interviews and synthesized findings into a quarterly insights report.'
    }
  ],
  education: [
    {
      school: 'Rhode Island School of Design',
      degree: 'BFA, Graphic Design',
      location: 'Providence, RI',
      start: '2014',
      end: '2018',
      details: 'Graduated with honors. Senior thesis on accessible color systems was published in Type Magazine.'
    }
  ],
  skillsRaw: 'Design: User research, Interaction design, Visual design, Design systems, Prototyping\nTools: Figma, Linear, Notion, Origami Studio, Principle\nOther: Cross-functional leadership, Mentorship, Workshop facilitation',
  projects: [
    {
      name: 'Open Color Lib',
      link: 'github.com/alexmorgan/opencolor',
      tech: 'TypeScript, React',
      description: 'A small open-source library for generating accessible color palettes. 4.2k GitHub stars and used by several design teams in production.'
    }
  ],
  certifications: [
    { name: 'Nielsen Norman UX Certification', issuer: 'NN/g', year: '2021' }
  ]
};

let state;
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  state = saved ? JSON.parse(saved) : structuredClone(sample);
} catch(e) { state = structuredClone(sample); }

// ensure shape
if(!state.personal) state = structuredClone(sample);
['experience','education','projects','certifications'].forEach(k=>{ if(!Array.isArray(state[k])) state[k]=[]; });

function persist(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

//============================================================
// EDITOR — bind inputs, repeatable groups
//============================================================
function getPath(obj, path){
  return path.split('.').reduce((o,k)=>o?.[k], obj);
}
function setPath(obj, path, val){
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((o,k)=>o[k]=o[k]||{}, obj);
  target[last] = val;
}

function bindAllInputs(){
  document.querySelectorAll('[data-bind]').forEach(el=>{
    const path = el.dataset.bind;
    el.value = getPath(state, path) ?? '';
    el.addEventListener('input', ()=>{
      setPath(state, path, el.value);
      persist();
      render();
    });
  });
}

const repeatableTemplates = {
  experience: () => ({ role:'', company:'', location:'', start:'', end:'', bullets:'' }),
  education: () => ({ school:'', degree:'', location:'', start:'', end:'', details:'' }),
  projects: () => ({ name:'', link:'', tech:'', description:'' }),
  certifications: () => ({ name:'', issuer:'', year:'' })
};

const repeatableFields = {
  experience: [
    { key:'role', label:'Role', placeholder:'Senior Designer' },
    { key:'company', label:'Company', placeholder:'Acme Inc.' },
    { key:'location', label:'Location', placeholder:'Remote' },
    { key:'start', label:'Start', placeholder:'Jan 2022' },
    { key:'end', label:'End', placeholder:'Present' },
    { key:'bullets', label:'Bullet points (one per line)', textarea:true, placeholder:'Led the redesign of...\nGrew engagement by 40%...' }
  ],
  education: [
    { key:'school', label:'School', placeholder:'Stanford University' },
    { key:'degree', label:'Degree', placeholder:'BS, Computer Science' },
    { key:'location', label:'Location', placeholder:'Stanford, CA' },
    { key:'start', label:'Start', placeholder:'2018' },
    { key:'end', label:'End', placeholder:'2022' },
    { key:'details', label:'Notes (optional)', textarea:true, placeholder:'GPA, honors, relevant coursework' }
  ],
  projects: [
    { key:'name', label:'Project name', placeholder:'Open Source Tool' },
    { key:'link', label:'Link', placeholder:'github.com/you/project' },
    { key:'tech', label:'Tech / tags', placeholder:'TypeScript, React' },
    { key:'description', label:'Description', textarea:true, placeholder:'A short description of what it does and your impact.' }
  ],
  certifications: [
    { key:'name', label:'Certification', placeholder:'AWS Solutions Architect' },
    { key:'issuer', label:'Issuer', placeholder:'Amazon' },
    { key:'year', label:'Year', placeholder:'2024' }
  ]
};

const repeatableLabels = {
  experience: i => `Position #${i+1}`,
  education: i => `Education #${i+1}`,
  projects: i => `Project #${i+1}`,
  certifications: i => `Certification #${i+1}`
};

function renderRepeatable(group){
  const list = state[group];
  const container = document.getElementById(group+'List');
  container.innerHTML='';
  if(list.length===0){
    container.innerHTML = '<p class="empty-text">Nothing yet — click below to add.</p>';
    return;
  }
  list.forEach((item,idx)=>{
    const entry = document.createElement('div');
    entry.className = 'entry';
    let html = `
      <div class="entry-head">
        <span class="entry-label">${repeatableLabels[group](idx)}</span>
        <button class="icon-btn" data-remove="${group}" data-idx="${idx}" title="Remove">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6.5 7v5M9.5 7v5M5 4l.5 9c0 .5.5 1 1 1h3c.5 0 1-.5 1-1L11 4M6 4V2.5c0-.3.2-.5.5-.5h3c.3 0 .5.2.5.5V4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>`;
    const fields = repeatableFields[group];
    // Build rows: pair short fields into 2-col rows
    const isShort = f => !f.textarea && (f.key==='start'||f.key==='end'||f.key==='year'||f.key==='location'||f.key==='link'||f.key==='tech');
    let i = 0;
    while(i<fields.length){
      const f = fields[i];
      if(isShort(f) && fields[i+1] && isShort(fields[i+1])){
        html += `<div class="field-row cols-2">`;
        for(let j=0;j<2;j++){
          const ff = fields[i+j];
          html += `<div class="field"><label>${ff.label}</label><input data-grp="${group}" data-idx="${idx}" data-key="${ff.key}" placeholder="${ff.placeholder||''}" value="${escapeAttr(item[ff.key]||'')}"></div>`;
        }
        html += `</div>`;
        i+=2;
      } else {
        if(f.textarea){
          html += `<div class="field"><label>${f.label}</label><textarea data-grp="${group}" data-idx="${idx}" data-key="${f.key}" rows="3" placeholder="${f.placeholder||''}">${escapeHtml(item[f.key]||'')}</textarea></div>`;
        } else {
          html += `<div class="field"><label>${f.label}</label><input data-grp="${group}" data-idx="${idx}" data-key="${f.key}" placeholder="${f.placeholder||''}" value="${escapeAttr(item[f.key]||'')}"></div>`;
        }
        i++;
      }
    }
    entry.innerHTML = html;
    container.appendChild(entry);
  });
  // wire up
  container.querySelectorAll('[data-grp]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const g = el.dataset.grp;
      const i = +el.dataset.idx;
      const k = el.dataset.key;
      state[g][i][k] = el.value;
      persist();
      render();
    });
  });
  container.querySelectorAll('[data-remove]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const g = b.dataset.remove;
      const i = +b.dataset.idx;
      state[g].splice(i,1);
      persist();
      renderRepeatable(g);
      render();
    });
  });
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function escapeAttr(s){return escapeHtml(s);}

document.querySelectorAll('[data-add]').forEach(b=>{
  b.addEventListener('click', ()=>{
    const g = b.dataset.add;
    state[g].push(repeatableTemplates[g]());
    persist();
    renderRepeatable(g);
    render();
  });
});

function parseSkills(raw){
  return (raw||'').split('\n').map(line=>line.trim()).filter(Boolean).map(line=>{
    const idx = line.indexOf(':');
    if(idx<0) return { category: '', items: line };
    return {
      category: line.slice(0,idx).trim(),
      items: line.slice(idx+1).trim()
    };
  });
}

//============================================================
// TEMPLATE PICKER
//============================================================
document.getElementById('tplPicker').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('#tplPicker button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.template = btn.dataset.tpl;
  persist();
  render();
});

//============================================================
// IMPORT / EXPORT / PRINT
//============================================================
document.getElementById('saveBtn').addEventListener('click', ()=>{
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `resume-${(state.personal.name||'untitled').replace(/\s+/g,'-').toLowerCase()}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('loadBtn').addEventListener('click', ()=>{
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      state = data;
      ['experience','education','projects','certifications'].forEach(k=>{ if(!Array.isArray(state[k])) state[k]=[]; });
      if(!state.personal) state.personal = {};
      persist();
      bindAllInputs();
      ['experience','education','projects','certifications'].forEach(renderRepeatable);
      // Update template button
      document.querySelectorAll('#tplPicker button').forEach(b=>{
        b.classList.toggle('active', b.dataset.tpl === state.template);
      });
      render();
    }catch(err){ alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('printBtn').addEventListener('click', ()=>{
  document.getElementById('resumePage').classList.add('is-printing');
  window.print();
  setTimeout(()=>document.getElementById('resumePage').classList.remove('is-printing'), 1000);
});

//============================================================
// INIT
//============================================================
bindAllInputs();
['experience','education','projects','certifications'].forEach(renderRepeatable);
render();
